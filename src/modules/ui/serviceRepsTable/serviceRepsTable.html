<template>
    <!-- Capacity-badge tooltip rendered outside the scrollable/clipping
         table-container so it can paint over any ancestor with overflow set.
         Positioned via JS with position: fixed (see serviceRepsTable.js). -->
    <div class="cap-tooltip" role="tooltip" aria-hidden="true"></div>
    <div class="table-scroll-wrap">
    <!-- Queue/Skill popover: position:absolute inside table-scroll-wrap so it scrolls with the page -->
    <template if:true={popoverVisible}>
        <div class="qs-popover" role="dialog" style={popoverStyle}>
            <div class="qs-popover__nubbin-row">
                <div class="qs-popover__nubbin"></div>
            </div>
            <div class="qs-popover__body">
                <button class="qs-popover__close" type="button" onclick={handleQsClose} title="Close">
                    <lightning-icon icon-name="utility:close" size="xx-small"></lightning-icon>
                </button>
                <div class="qs-popover__header">
                    <div class="qs-popover__header-title">
                        <lightning-icon icon-name={popoverIcon} size="small" class="qs-popover__header-icon"></lightning-icon>
                        <span class="qs-popover__name">{popoverName}</span>
                    </div>
                    <div class="qs-popover__header-grid">
                        <div class="qs-popover__field">
                            <span class="qs-popover__label qs-popover__label--header">Priority</span>
                            <span class="qs-popover__value">{popoverPriority}</span>
                        </div>
                        <div class="qs-popover__field">
                            <span class="qs-popover__label qs-popover__label--header">Work Size</span>
                            <span class="qs-popover__value">{popoverWorkSize}</span>
                        </div>
                    </div>
                </div>
                <div class="qs-popover__section">
                    <div class="qs-popover__section-title">
                        <lightning-icon icon-name="utility:questions_and_answers" size="small" class="qs-popover__section-icon"></lightning-icon>
                        <span>Service Reps</span>
                    </div>
                    <div class="qs-popover__grid">
                        <div class="qs-popover__grid-row">
                            <div class="qs-popover__col">
                                <span class="qs-popover__label">Online</span>
                                <span class="qs-popover__value">{popoverOnline}</span>
                            </div>
                            <div class="qs-popover__col">
                                <span class="qs-popover__label">Busy</span>
                                <span class="qs-popover__value">{popoverBusy}</span>
                            </div>
                        </div>
                        <div class="qs-popover__grid-row">
                            <div class="qs-popover__col">
                                <span class="qs-popover__label">At Primary Capacity</span>
                                <span class="qs-popover__value">{popoverAtCapacity}</span>
                            </div>
                            <div class="qs-popover__col">
                                <span class="qs-popover__label">Idle</span>
                                <span class="qs-popover__value">{popoverIdle}</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="qs-popover__section">
                    <div class="qs-popover__section-title">
                        <lightning-icon icon-name="utility:indicator_performance_period" size="small" class="qs-popover__section-icon"></lightning-icon>
                        <span>Queue Performance</span>
                    </div>
                    <div class="qs-popover__grid">
                        <div class="qs-popover__grid-row">
                            <div class="qs-popover__col">
                                <span class="qs-popover__label">Total Waiting</span>
                                <span class="qs-popover__value">{popoverTotalWaiting}</span>
                            </div>
                            <div class="qs-popover__col">
                                <span class="qs-popover__label">Longest Wait Time</span>
                                <span class="qs-popover__value qs-popover__value--error">{popoverLongestWait}</span>
                            </div>
                        </div>
                        <div class="qs-popover__grid-row">
                            <div class="qs-popover__col">
                                <span class="qs-popover__label">Average Wait Time</span>
                                <span class="qs-popover__value">{popoverAvgWait}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div><!-- /.qs-popover__body -->
        </div>
    </template>
    <div class="table-container">
        <table class="slds-table slds-table_bordered slds-table_col-bordered slds-no-row-hover">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col" class="slds-cell_shrink">
                        <div class="slds-text-align_center">
                            <input type="checkbox" class="hdr-checkbox" checked={allSelected} onchange={handleSelectAll} />
                        </div>
                    </th>
                    <template for:each={columnHeaders} for:item="col">
                        <th key={col.fieldName} scope="col" style={col.style} class={col.thClass} data-field={col.fieldName} onclick={handleSort}>
                            <div class="slds-th__action th-action-inner">
                                <span class="slds-truncate">{col.label}</span>
                                <lightning-icon icon-name="utility:chevrondown" size="xx-small" class="col-chevron"></lightning-icon>
                            </div>
                        </th>
                    </template>
                </tr>
            </thead>
            <tbody>
                <template for:each={tableRows} for:item="row">
                    <!-- Parent rep row -->
                    <tr key={row.id} class={row.repRowClass} data-id={row.id} onclick={handleRowClick}>
                        <td class="slds-cell_shrink">
                            <div class="slds-text-align_center">
                                <input type="checkbox" class="row-checkbox" checked={row.isSelected} data-id={row.id} onchange={handleRowSelect} />
                            </div>
                        </td>
                        <!-- Change 2: chevron always visible, rotates to down when expanded -->
                        <td class="rep-name-td">
                            <div class="rep-name-inner">
                                <template if:true={row.hasChildren}>
                                    <button class="toggle-btn" data-id={row.id} onclick={handleExpandToggle} aria-expanded={row.isExpanded}>
                                        <template if:false={row.isExpanded}>
                                            <lightning-icon icon-name="utility:chevronright" size="xx-small"></lightning-icon>
                                        </template>
                                        <template if:true={row.isExpanded}>
                                            <lightning-icon icon-name="utility:chevrondown" size="xx-small"></lightning-icon>
                                        </template>
                                    </button>
                                </template>
                                <template if:false={row.hasChildren}>
                                    <span class="toggle-spacer"></span>
                                </template>
                                <span class="rep-name">{row.name}</span>
                            </div>
                        </td>
                        <td class={row.statusCellClass}>
                            <div class="status-inner">
                                <lightning-icon icon-name={row.statusIcon} size="xx-small" class="status-dot"></lightning-icon>
                                <div class="status-text">
                                    <span class="status-label">{row.statusLabel}</span>
                                    <span class="status-time">{row.statusTime}</span>
                                </div>
                            </div>
                        </td>
                        <!-- Channels (moved left of Work Summary). Icons replace text per design. -->
                        <td>
                            <div class="channel-icons">
                                <template for:each={row.channelIcons} for:item="ch">
                                    <lightning-icon key={ch.icon} icon-name={ch.icon} size="xx-small" title={ch.label} class="channel-icon"></lightning-icon>
                                </template>
                            </div>
                        </td>
                        <td>{row.workSummary}</td>
                        <!-- Flag (moved right of Work Summary). -->
                        <td class="slds-text-align_left">
                            <template if:true={row.hasFlagIcon}>
                                <span class="flag-pill" role="img" aria-label="Flagged" title="Flagged">
                                    <lightning-icon icon-name="utility:priority" size="xx-small"></lightning-icon>
                                </span>
                            </template>
                        </td>
                        <td class="slds-text-align_right">{row.login}</td>
                        <td class="slds-text-align_right">{row.state}</td>
                        <td class="capacity-cell">
                            <div class="capacity-badges">
                                <span class="capacity-badge capacity-badge_primary" data-tooltip="Primary capacity"
                                    onmouseenter={handleTooltipShow} onmouseleave={handleTooltipHide}
                                    onfocus={handleTooltipShow} onblur={handleTooltipHide}
                                    tabindex="0">{row.capacityPLabel}</span>
                                <span class="capacity-badge capacity-badge_interruptible" data-tooltip="Interruptible capacity"
                                    onmouseenter={handleTooltipShow} onmouseleave={handleTooltipHide}
                                    onfocus={handleTooltipShow} onblur={handleTooltipHide}
                                    tabindex="0">{row.capacityILabel}</span>
                            </div>
                        </td>
                        <td class="slds-text-align_right">{row.accept}</td>
                        <td class="slds-text-align_right">{row.workload}</td>
                        <td class="slds-text-align_right">{row.acw}</td>
                        <td class="srt-chips-cell">
                            <template for:each={row.queueItems} for:item="qi">
                                <span key={qi.display} class={qi.chipClass}
                                      data-qs-type="queue"
                                      data-qs-name={qi.name}
                                      onclick={handleQsClick}>{qi.display}</span>
                            </template>
                        </td>
                        <td class="srt-chips-cell">
                            <template for:each={row.skillItems} for:item="si">
                                <span key={si.display} class={si.chipClass}
                                      data-qs-type="skill"
                                      data-qs-name={si.name}
                                      onclick={handleQsClick}>{si.display}</span>
                            </template>
                        </td>
                    </tr>
                    <!-- Expanded: rep row + this panel read as one rounded card.
                         Layout matches Figma node 20248:28319 (Accordion container). -->
                    <template if:true={row.hasChildren}>
                        <tr key={row.wiPanelId} class={row.wiPanelClass}>
                            <td colspan="14" class="work-item-cell">
                                <p class="wi-section-header">Active Work Items</p>
                                <div class="wi-stack">
                                    <template for:each={row.workItems} for:item="wi">
                                        <article key={wi.id} class="wi-card">
                                            <div class="wi-content">
                                                <div class="wi-top-row">
                                                    <span class="wi-summary" title={wi.summaryText}>{wi.summaryText}</span>
                                                </div>
                                                <div class="wi-meta-row">
                                                    <lightning-icon icon-name={wi.channelIcon} size="xx-small" alternative-text={wi.channelLabel} class="wi-meta-icon"></lightning-icon>
                                                    <span class="wi-meta-dot" aria-hidden="true"></span>
                                                    <span class="wi-meta-value">{wi.workLoadText}</span>
                                                    <span class="wi-meta-dot" aria-hidden="true"></span>
                                                    <span class="wi-meta-pair">
                                                        <lightning-icon icon-name={wi.routeIcon} size="xx-small" class="wi-meta-icon"></lightning-icon>
                                                        <span class="wi-meta-value qs-trigger"
                                                              data-qs-type={wi.routeType}
                                                              data-qs-name={wi.routeValue}
                                                              onclick={handleQsClick}>{wi.routeValue}</span>
                                                    </span>
                                                    <template if:true={wi.isInterruptible}>
                                                        <span class="wi-meta-dot" aria-hidden="true"></span>
                                                        <span class="wi-meta-pair">
                                                            <lightning-icon icon-name="utility:check" size="xx-small" class="wi-meta-icon"></lightning-icon>
                                                            <span class="wi-meta-value">Interruptible</span>
                                                        </span>
                                                    </template>
                                                </div>
                                            </div>
                                            <div class="wi-actions">
                                                <template if:true={wi.hasFlagIcon}>
                                                    <div class="wi-flag-wrap">
                                                        <lightning-button-icon
                                                            icon-name="utility:priority"
                                                            variant="border-filled"
                                                            size="medium"
                                                            alternative-text="Flag actions"
                                                            title="Flag actions"
                                                            data-id={wi.id}
                                                            onclick={handleWiFlagToggle}
                                                            class="wi-flag-btn">
                                                        </lightning-button-icon>
                                                        <template if:true={wi.isFlagOpen}>
                                                            <div class="ipt-flag-popover" role="dialog" aria-labelledby={wi.flagPopoverTitleId}>
                                                                <div class="ipt-flag-popover__body">
                                                                    <p class="ipt-flag-popover__title" id={wi.flagPopoverTitleId}>{wi.flagWhisperTitle}</p>
                                                                    <p class="ipt-flag-popover__text">{wi.flagWhisperBody}</p>
                                                                </div>
                                                                <footer class="ipt-flag-popover__footer">
                                                                    <lightning-button
                                                                        variant="neutral"
                                                                        icon-name="utility:lower_flag"
                                                                        icon-position="left"
                                                                        label="Lower Flag"
                                                                        data-id={wi.id}
                                                                        onclick={handleWiLowerFlag}>
                                                                    </lightning-button>
                                                                </footer>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                                <lightning-button label="Monitor" variant="neutral" class="wi-monitor-btn"></lightning-button>
                                            </div>
                                        </article>
                                    </template>
                                </div>

                                <!-- Paused Work Items: base button toggles a collapsed
                                     list of paused cards (Figma node 20275:30685). -->
                                <template if:true={row.hasPausedItems}>
                                    <div class="wi-paused">
                                        <button type="button" class="wi-paused-toggle" data-id={row.id} onclick={handlePausedToggle} aria-expanded={row.isPausedOpen}>
                                            <span class="wi-paused-toggle-label">Paused Work Items</span>
                                            <lightning-icon icon-name={row.pausedToggleIcon} size="xx-small" class="wi-paused-toggle-icon"></lightning-icon>
                                        </button>
                                        <template if:true={row.isPausedOpen}>
                                            <div class="wi-stack wi-paused-stack">
                                                <template for:each={row.pausedItems} for:item="wi">
                                                    <article key={wi.id} class="wi-card">
                                                        <div class="wi-content">
                                                            <div class="wi-top-row">
                                                                <span class="wi-summary" title={wi.summaryText}>{wi.summaryText}</span>
                                                            </div>
                                                            <div class="wi-meta-row">
                                                                <lightning-icon icon-name={wi.channelIcon} size="xx-small" alternative-text={wi.channelLabel} class="wi-meta-icon"></lightning-icon>
                                                                <span class="wi-meta-dot" aria-hidden="true"></span>
                                                                <span class="wi-meta-value">{wi.workLoadText}</span>
                                                                <span class="wi-meta-dot" aria-hidden="true"></span>
                                                                <span class="wi-meta-pair">
                                                                    <lightning-icon icon-name={wi.routeIcon} size="xx-small" class="wi-meta-icon"></lightning-icon>
                                                                    <span class="wi-meta-value qs-trigger"
                                                                          data-qs-type={wi.routeType}
                                                                          data-qs-name={wi.routeValue}
                                                                          onmouseenter={handleQsEnter}
                                                                          onmouseleave={handleQsLeave}>{wi.routeValue}</span>
                                                                </span>
                                                                <template if:true={wi.isInterruptible}>
                                                                    <span class="wi-meta-dot" aria-hidden="true"></span>
                                                                    <span class="wi-meta-pair">
                                                                        <lightning-icon icon-name="utility:check" size="xx-small" class="wi-meta-icon"></lightning-icon>
                                                                        <span class="wi-meta-value">Interruptible</span>
                                                                    </span>
                                                                </template>
                                                            </div>
                                                        </div>
                                                        <div class="wi-actions">
                                                            <lightning-button label="Monitor" variant="neutral" class="wi-monitor-btn"></lightning-button>
                                                        </div>
                                                    </article>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </td>
                        </tr>
                    </template>
                </template>
            </tbody>
        </table>
    </div>
    </div>
</template>

<template>
    <!-- Capacity-badge tooltip rendered outside the scrollable/clipping
         table-container so it can paint over any ancestor with overflow set.
         Positioned via JS with position: fixed (see serviceRepsTable.js). -->
    <div class="cap-tooltip" role="tooltip" aria-hidden="true"></div>
    <div class="table-scroll-wrap">
    <div class="table-container">
        <table class="slds-table slds-table_bordered slds-table_col-bordered">
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col" class="slds-cell_shrink">
                        <div class="slds-text-align_center">
                            <input type="checkbox" class="hdr-checkbox" checked={allSelected} onchange={handleSelectAll} />
                        </div>
                    </th>
                    <template for:each={columnHeaders} for:item="col">
                        <th key={col.fieldName} scope="col" style={col.style} class={col.thClass} data-field={col.fieldName} onclick={handleSort}>
                            <div class="slds-th__action th-action-inner">
                                <span class="slds-truncate">{col.label}</span>
                                <lightning-icon icon-name="utility:chevrondown" size="xx-small" class="col-chevron"></lightning-icon>
                            </div>
                        </th>
                    </template>
                </tr>
            </thead>
            <tbody>
                <template for:each={tableRows} for:item="row">
                    <!-- Parent rep row -->
                    <tr key={row.id} class={row.repRowClass} data-id={row.id} onclick={handleRowClick}>
                        <td class="slds-cell_shrink">
                            <div class="slds-text-align_center">
                                <input type="checkbox" class="row-checkbox" checked={row.isSelected} data-id={row.id} onchange={handleRowSelect} />
                            </div>
                        </td>
                        <!-- Change 2: chevron always visible, rotates to down when expanded -->
                        <td class="rep-name-td">
                            <div class="rep-name-inner">
                                <template if:true={row.hasChildren}>
                                    <button class="toggle-btn" data-id={row.id} onclick={handleExpandToggle} aria-expanded={row.isExpanded}>
                                        <template if:false={row.isExpanded}>
                                            <lightning-icon icon-name="utility:chevronright" size="xx-small"></lightning-icon>
                                        </template>
                                        <template if:true={row.isExpanded}>
                                            <lightning-icon icon-name="utility:chevrondown" size="xx-small"></lightning-icon>
                                        </template>
                                    </button>
                                </template>
                                <template if:false={row.hasChildren}>
                                    <span class="toggle-spacer"></span>
                                </template>
                                <span class="rep-name">{row.name}</span>
                            </div>
                        </td>
                        <td class={row.statusCellClass}>
                            <div class="status-inner">
                                <lightning-icon icon-name={row.statusIcon} size="xx-small" class="status-dot"></lightning-icon>
                                <div class="status-text">
                                    <span class="status-label">{row.statusLabel}</span>
                                    <span class="status-time">{row.statusTime}</span>
                                </div>
                            </div>
                        </td>
                        <!-- Channels (moved left of Work Summary). Icons replace text per design. -->
                        <td>
                            <div class="channel-icons">
                                <template for:each={row.channelIcons} for:item="ch">
                                    <lightning-icon key={ch.icon} icon-name={ch.icon} size="xx-small" title={ch.label} class="channel-icon"></lightning-icon>
                                </template>
                            </div>
                        </td>
                        <td>{row.workSummary}</td>
                        <!-- Flag (moved right of Work Summary). -->
                        <td class="slds-text-align_left">
                            <template if:true={row.hasFlagIcon}>
                                <span class="flag-pill" role="img" aria-label="Flagged" title="Flagged">
                                    <lightning-icon icon-name="utility:priority" size="xx-small"></lightning-icon>
                                </span>
                            </template>
                        </td>
                        <td class="slds-text-align_right">{row.login}</td>
                        <td class="slds-text-align_right">{row.state}</td>
                        <td class="capacity-cell">
                            <div class="capacity-badges">
                                <span class="capacity-badge capacity-badge_primary" data-tooltip="Primary capacity"
                                    onmouseenter={handleTooltipShow} onmouseleave={handleTooltipHide}
                                    onfocus={handleTooltipShow} onblur={handleTooltipHide}
                                    tabindex="0">{row.capacityPLabel}</span>
                                <span class="capacity-badge capacity-badge_interruptible" data-tooltip="Interruptible capacity"
                                    onmouseenter={handleTooltipShow} onmouseleave={handleTooltipHide}
                                    onfocus={handleTooltipShow} onblur={handleTooltipHide}
                                    tabindex="0">{row.capacityILabel}</span>
                            </div>
                        </td>
                        <td class="slds-text-align_right">{row.accept}</td>
                        <td class="slds-text-align_right">{row.workload}</td>
                        <td class="slds-text-align_right">{row.acw}</td>
                        <td>{row.queuesDisplay}</td>
                        <td>{row.skillsDisplay}</td>
                    </tr>
                    <!-- Expanded: stack of work-item cards matching Figma node 19988:23606. -->
                    <template if:true={row.hasChildren}>
                        <tr key={row.wiPanelId} class={row.wiPanelClass}>
                            <td colspan="14" class="work-item-cell">
                                <div class="wi-stack">
                                    <template for:each={row.workItems} for:item="wi">
                                        <article key={wi.id} class="wi-card">
                                            <div class="wi-content">
                                                <div class="wi-top-row">
                                                    <span class="wi-customer">{wi.customerLabel}</span>
                                                    <a href="javascript:void(0)" class="wi-summary-link" title={wi.summaryLink}>{wi.summaryLink}</a>
                                                </div>
                                                <div class="wi-meta-row">
                                                    <span class={wi.channelIconClass} aria-hidden="true">
                                                        <lightning-icon icon-name={wi.channelIcon} size="xx-small" alternative-text={wi.channelLabel}></lightning-icon>
                                                    </span>
                                                    <span class="wi-meta-dot" aria-hidden="true"></span>
                                                    <span class="wi-meta-pair"><span class="wi-meta-label">{wi.workLoadLabel}</span><span class="wi-meta-value">{wi.workLoadValue}</span></span>
                                                    <span class="wi-meta-dot" aria-hidden="true"></span>
                                                    <span class="wi-meta-pair"><span class="wi-meta-label">{wi.queueLabel}</span><span class="wi-meta-value">{wi.queueValue}</span></span>
                                                </div>
                                            </div>
                                            <div class="wi-actions">
                                                <template if:true={wi.hasFlagIcon}>
                                                    <div class="wi-flag-wrap">
                                                        <lightning-button-icon
                                                            icon-name="utility:priority"
                                                            variant="brand"
                                                            size="medium"
                                                            alternative-text="Flag actions"
                                                            title="Flag actions"
                                                            data-id={wi.id}
                                                            onclick={handleWiFlagToggle}
                                                            class="wi-flag-btn">
                                                        </lightning-button-icon>
                                                        <template if:true={wi.isFlagOpen}>
                                                            <div class="ipt-flag-popover" role="dialog" aria-labelledby={wi.flagPopoverTitleId}>
                                                                <div class="ipt-flag-popover__body">
                                                                    <p class="ipt-flag-popover__title" id={wi.flagPopoverTitleId}>{wi.flagWhisperTitle}</p>
                                                                    <p class="ipt-flag-popover__text">{wi.flagWhisperBody}</p>
                                                                </div>
                                                                <footer class="ipt-flag-popover__footer">
                                                                    <lightning-button
                                                                        variant="neutral"
                                                                        icon-name="utility:lower_flag"
                                                                        icon-position="left"
                                                                        label="Lower Flag"
                                                                        data-id={wi.id}
                                                                        onclick={handleWiLowerFlag}>
                                                                    </lightning-button>
                                                                </footer>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                                <lightning-button label="Monitor" variant="neutral" class="wi-monitor-btn"></lightning-button>
                                            </div>
                                        </article>
                                    </template>
                                </div>
                            </td>
                        </tr>
                    </template>
                </template>
            </tbody>
        </table>
    </div>
    </div>
</template>

<template>
    <article class={cardClass}>
        <header class="kc-header">
            <div class="kc-header-text">
                <h3 class="kc-title">{title}</h3>
                <template if:true={caption}>
                    <div class="kc-caption-row">
                        <span class="kc-caption">{captionText}</span>
                        <template if:true={hasAppliedFilters}>
                            <template for:each={appliedFilterBadges} for:item="badge">
                                <span
                                    key={badge.id}
                                    class="kc-filter-badge"
                                    data-badge-id={badge.id}
                                    onmouseenter={handleBadgeMouseEnter}
                                    onmouseleave={handleBadgeMouseLeave}>
                                    <span class="kc-filter-badge-group">{badge.groupLabel}</span><span class="kc-filter-badge-values">: {badge.values}</span>
                                    <button
                                        type="button"
                                        class="kc-filter-badge-remove"
                                        data-group={badge.id}
                                        aria-label="Remove filter"
                                        onclick={handleBadgeRemove}>
                                        <lightning-icon icon-name="utility:close" size="xx-small" alternative-text="Remove"></lightning-icon>
                                    </button>
                                </span>
                            </template>
                            <template if:true={hasAppliedFilterOverflow}>
                                <span class="kc-filter-overflow">{appliedFilterOverflowLabel}</span>
                            </template>
                        </template>
                    </div>
                </template>
            </div>
            <template if:true={hasMenu}>
                <div class="kc-menu">
                    <button
                        type="button"
                        class="kc-menu-btn"
                        aria-haspopup="dialog"
                        aria-expanded={menuOpen}
                        aria-label="Card settings"
                        onclick={toggleMenu}>
                        <lightning-icon
                            icon-name="utility:down"
                            size="xx-small"
                            alternative-text="Card settings">
                        </lightning-icon>
                    </button>
                    <template if:true={menuOpen}>
                        <ui-card-menu-panel
                            active-timeframe={_activeTimeframe}
                            filter-groups={filterGroups}
                            selected-filters={currentSelectedFilters}
                            show-timeframe={showTimeframe}
                            panel-style={panelStyle}
                            onclose={closeMenu}
                            onapply={handleApply}>
                        </ui-card-menu-panel>
                    </template>
                </div>
            </template>
        </header>

        <div class="kc-body">
            <slot></slot>
        </div>
    </article>

    <!-- Filter value popover — rendered fixed above all content -->
    <template if:true={showPopover}>
        <div class="kc-popover" style={popoverStyle} role="tooltip">
            <div class="kc-popover-nubbin"></div>
            <div class="kc-popover-body">
                <p class="kc-popover-group">{hoveredBadge.groupLabel}</p>
                <template for:each={hoveredBadge.allItems} for:item="item">
                    <p key={item.id} class="kc-popover-item">{item.label}</p>
                </template>
            </div>
        </div>
    </template>
</template>

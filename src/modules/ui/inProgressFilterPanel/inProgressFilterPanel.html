<template>
    <aside class="fp"
           aria-labelledby="fp-title"
           onkeydown={handleHeaderKeydown}
           onclick={handlePanelClick}>
        <header class="fp-header">
            <h2 id="fp-title" class="fp-title">Filters</h2>
            <div class="fp-close">
                <lightning-button-icon
                    icon-name="utility:close"
                    size="small"
                    variant="bare"
                    alternative-text="Close filters"
                    title="Close"
                    onclick={handleClose}>
                </lightning-button-icon>
            </div>
        </header>

        <div class="fp-body">
            <div class="fp-facet-list">
            <template for:each={facetList} for:item="facet">
                <section key={facet.id} class={facet.wrapperClass}>
                    <div class="fp-facet__row-wrap">
                        <button
                            type="button"
                            class="fp-facet__row"
                            data-facet={facet.id}
                            aria-expanded={facet.isExpanded}
                            onclick={handleFacetToggle}>
                            <span class="fp-facet__label">{facet.label}</span>
                            <span class="fp-facet__summary">{facet.summary}</span>
                        </button>
                        <template if:true={facet.hasSelection}>
                            <button
                                type="button"
                                class="fp-facet__clear-btn"
                                data-facet={facet.id}
                                title="Clear {facet.label} filter"
                                aria-label="Clear {facet.label} filter"
                                onclick={handleFacetClearCard}>
                                <lightning-icon
                                    icon-name="utility:delete"
                                    size="xx-small"
                                    alternative-text=""
                                    class="fp-facet__clear-icon">
                                </lightning-icon>
                            </button>
                        </template>
                    </div>
                </section>
            </template>
            </div>

            <template if:true={hasAnySelection}>
                <div class="fp-reset">
                    <button
                        type="button"
                        class="fp-reset__btn"
                        onclick={handleResetAll}>
                        Reset filters
                    </button>
                </div>
            </template>
        </div>
    </aside>

    <!-- Popover: floats to the LEFT of the panel, outside .fp so it's not
         clipped by .fp's overflow. Position is driven by popoverStyle (JS
         computes top based on active facet index). -->
    <template if:true={hasPopover}>
        <div class="fp-popover" style={popoverStyle}>
            <div class="fp-popover__nubbin"></div>
            <div class="fp-popover__inner">
                <p class="fp-popover__title">{popoverData.title}</p>

                <template if:true={popoverData.isSearchable}>
                    <div class="fp-popover__search">
                        <lightning-input
                            type="search"
                            variant="label-hidden"
                            label={popoverData.searchPlaceholder}
                            placeholder={popoverData.searchPlaceholder}
                            value={popoverData.searchTerm}
                            data-facet={popoverData.id}
                            onchange={handleFacetSearch}
                            oninput={handleFacetSearch}>
                        </lightning-input>
                    </div>
                </template>

                <template if:true={popoverData.noResults}>
                    <p class="fp-popover__empty">No matching options</p>
                </template>

                <template if:false={popoverData.noResults}>
                    <ul class="fp-popover__options" role="group">
                        <li class="fp-popover__option">
                            <lightning-input
                                type="checkbox"
                                label="All"
                                checked={popoverData.allChecked}
                                onchange={handleAllOptionChange}
                                class="fp-popover__checkbox">
                            </lightning-input>
                        </li>
                        <template for:each={popoverData.options} for:item="opt">
                            <li key={opt.key} class="fp-popover__option">
                                <lightning-input
                                    type="checkbox"
                                    label={opt.label}
                                    checked={opt.checked}
                                    data-facet={popoverData.id}
                                    data-value={opt.value}
                                    onchange={handleOptionChange}
                                    class="fp-popover__checkbox">
                                </lightning-input>
                            </li>
                        </template>
                    </ul>
                </template>

                <template if:true={popoverData.hasSelection}>
                    <div class="fp-popover__actions">
                        <button
                            type="button"
                            class="fp-popover__clear-btn"
                            data-facet={popoverData.id}
                            onclick={handleFacetClear}>
                            Clear
                        </button>
                    </div>
                </template>
            </div>
        </div>
    </template>
</template>

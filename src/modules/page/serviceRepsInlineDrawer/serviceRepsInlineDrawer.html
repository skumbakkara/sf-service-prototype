<template>
    <div class="service-reps-page">
        <div class="slds-m-horizontal_medium slds-m-top_medium">
            <lightning-tabset active-tab-value={activeTab} ontabchange={handleTabChange}>

                <lightning-tab label="Wallboard" value="wallboard"></lightning-tab>

                <lightning-tab label="Service Reps" value="service-reps">
                <div class="page-layout slds-m-top_medium">

                <!-- Table area -->
                <div class={tableAreaClass}>
                    <div class="slds-card">

                        <!-- Card header -->
                        <div class="slds-card__header slds-p-around_medium slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <lightning-icon
                                    icon-name="standard:service_crew"
                                    size="medium"
                                    class="slds-m-right_small">
                                </lightning-icon>
                                <div>
                                    <h2 class="slds-text-heading_medium">Service Reps Overview</h2>
                                    <p class="slds-text-body_small slds-text-color_weak">An overview of all the service representatives in your team</p>
                                </div>
                            </div>
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <lightning-button-group>
                                    <lightning-button label="Accordion" variant="neutral" onclick={handleAccordionToggle}></lightning-button>
                                    <lightning-button label="Inline Drawer" variant="brand"></lightning-button>
                                </lightning-button-group>
                            </div>
                        </div>

                        <!-- Stats + search bar -->
                        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-p-horizontal_medium slds-p-bottom_small">
                            <p class="slds-text-body_small slds-text-color_weak">312 Reps &bull; 3 Flags Raised</p>
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <lightning-input
                                    type="search"
                                    label="Search reps"
                                    variant="label-hidden"
                                    placeholder="Search..."
                                    class="search-input slds-m-right_x-small">
                                </lightning-input>
                                <lightning-button-icon icon-name="utility:filter" variant="neutral" class="slds-m-right_xx-small"></lightning-button-icon>
                                <lightning-button-icon icon-name="utility:chevrondown" variant="neutral"></lightning-button-icon>
                            </div>
                        </div>

                        <!-- Table -->
                        <ui-service-reps-table-inline
                            data={reps}
                            open-rep-ids={openRepIds}
                            onrowclick={handleRowClick}>
                        </ui-service-reps-table-inline>

                    </div>
                </div>

                <!-- Inline drawer -->
                <template if:true={drawerOpen}>
                    <div class="drawer-area">
                        <ui-rep-inline-drawer
                            tabs-data={openTabs}
                            active-tab-id={activeTabId}
                            ontabselect={handleTabSelect}
                            ontabclose={handleTabClose}>
                        </ui-rep-inline-drawer>
                    </div>
                </template>

                </div>
                </lightning-tab>

                <lightning-tab label="In-Progress Work" value="in-progress"></lightning-tab>

                <lightning-tab label="Backlog" value="backlog"></lightning-tab>

            </lightning-tabset>
        </div>
    </div>
</template>

<template>
    <div class="service-reps-page">

        <!-- Tab bar + content -->
        <div class="slds-m-horizontal_medium slds-m-top_medium">
            <lightning-tabset active-tab-value={activeTab} ontabchange={handleTabChange}>

                <lightning-tab label="Wallboard" value="wallboard"></lightning-tab>

                <lightning-tab label="Service Reps" value="service-reps">
                    <!-- Card -->
                    <div class="slds-card slds-m-top_medium">

                        <!-- Card header -->
                        <div class="slds-card__header slds-p-around_medium slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <lightning-icon
                                    icon-name="utility:questions_and_answers"
                                    size="medium"
                                    class="slds-m-right_small">
                                </lightning-icon>
                                <div>
                                    <h2 class="slds-text-heading_medium">Service Reps Overview</h2>
                                    <p class="slds-text-body_small slds-text-color_weak">An overview of all the service representatives in your team</p>
                                </div>
                            </div>
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <lightning-button-group>
                                    <lightning-button label="Action 1" variant="neutral"></lightning-button>
                                    <lightning-button label="Action 2" variant="neutral"></lightning-button>
                                </lightning-button-group>
                            </div>
                        </div>

                        <!-- Stats + search bar -->
                        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-p-horizontal_medium slds-p-bottom_small">
                            <p class="slds-text-body_small slds-text-color_weak">312 Reps &bull; 3 Flags Raised</p>
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <lightning-input
                                    type="search"
                                    label="Search reps"
                                    variant="label-hidden"
                                    placeholder="Search..."
                                    class="search-input slds-m-right_x-small">
                                </lightning-input>
                                <lightning-button-group>
                                    <lightning-button-icon icon-name="utility:filterList" variant="border-filled" alternative-text="Filter" title="Filter"></lightning-button-icon>
                                    <lightning-button-menu icon-name="utility:down" variant="border-filled" alternative-text="Filter options" menu-alignment="right">
                                        <lightning-menu-item value="all" label="All reps"></lightning-menu-item>
                                        <lightning-menu-item value="online" label="Online only"></lightning-menu-item>
                                        <lightning-menu-item value="flagged" label="Flagged"></lightning-menu-item>
                                    </lightning-button-menu>
                                </lightning-button-group>
                            </div>
                        </div>

                        <!-- Tree Grid table -->
                        <ui-service-reps-table data={reps}></ui-service-reps-table>

                    </div>
                </lightning-tab>

                <lightning-tab label="In-Progress Work" value="in-progress"></lightning-tab>

                <lightning-tab label="Backlog" value="backlog"></lightning-tab>

            </lightning-tabset>
        </div>
    </div>
</template>
